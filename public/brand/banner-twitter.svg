<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500">
  <defs>
    <symbol id="mark" viewBox="0 0 24 24">
      <g transform="rotate(30 12 12)">
        <rect x="11" y="2" width="2" height="20" rx="1"/>
        <rect x="11" y="2" width="2" height="20" rx="1" transform="rotate(60 12 12)"/>
        <rect x="11" y="2" width="2" height="20" rx="1" transform="rotate(-60 12 12)"/>
      </g>
    </symbol>
    <linearGradient id="bgsky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6efde"/>
      <stop offset="55%" stop-color="#f6efde"/>
      <stop offset="100%" stop-color="#a7d2ee"/>
    </linearGradient>
    <filter id="softcloud" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="1500" height="500" fill="url(#bgsky)"/>
  <g filter="url(#softcloud)" fill="#fdfbf5" opacity="0.85">
    <ellipse cx="1180" cy="140" rx="220" ry="40"/>
    <ellipse cx="1320" cy="380" rx="200" ry="36"/>
  </g>

  <g fill="#1a1f2b">
    <use href="#mark" x="120" y="160" width="200" height="200"/>
  </g>

  <text x="350" y="282" fill="#1a1f2b"
        font-family="Fraunces, Georgia, serif" font-style="italic"
        font-size="128" font-weight="500" letter-spacing="-3">Lumiose</text>

  <text x="354" y="332" fill="#3a414f"
        font-family="Inter, system-ui, sans-serif"
        font-size="24" font-weight="500" letter-spacing="3">ESTUDIO DIGITAL · MEXICALI ↔ CALEXICO</text>
</svg>
