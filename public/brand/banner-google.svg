<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="576" viewBox="0 0 1024 576">
  <defs>
    <symbol id="mark" viewBox="0 0 24 24">
      <g transform="rotate(30 12 12)">
        <rect x="11" y="2" width="2" height="20" rx="1"/>
        <rect x="11" y="2" width="2" height="20" rx="1" transform="rotate(60 12 12)"/>
        <rect x="11" y="2" width="2" height="20" rx="1" transform="rotate(-60 12 12)"/>
      </g>
    </symbol>
    <linearGradient id="bgsky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#bfe0f5"/>
      <stop offset="48%" stop-color="#a7d2ee"/>
      <stop offset="100%" stop-color="#f6efde"/>
    </linearGradient>
    <filter id="softcloud" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>
  <rect width="1024" height="576" fill="url(#bgsky)"/>
  <g filter="url(#softcloud)" fill="#fdfbf5" opacity="0.9">
    <ellipse cx="180" cy="120" rx="200" ry="32"/>
    <ellipse cx="820" cy="180" rx="220" ry="34"/>
    <ellipse cx="500" cy="80" rx="160" ry="22"/>
  </g>

  <g fill="#1a1f2b">
    <use href="#mark" x="422" y="170" width="180" height="180"/>
  </g>

  <text x="512" y="400" fill="#1a1f2b" text-anchor="middle"
        font-family="Fraunces, Georgia, serif" font-style="italic"
        font-size="80" font-weight="500" letter-spacing="-1.5">Lumiose</text>

  <text x="512" y="436" fill="#3a414f" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif"
        font-size="20" font-weight="500" letter-spacing="3">ESTUDIO DIGITAL</text>

  <line x1="380" y1="470" x2="644" y2="470" stroke="#1a1f2b" stroke-width="1" opacity="0.25"/>

  <text x="512" y="506" fill="#1a1f2b" text-anchor="middle"
        font-family="Fraunces, Georgia, serif" font-style="italic"
        font-size="22" font-weight="400">Mexicali · Calexico</text>
  <text x="512" y="536" fill="#3a414f" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif"
        font-size="15" font-weight="400">Diseño · SEO · Publicidad · Infraestructura · Consultoría</text>
</svg>
