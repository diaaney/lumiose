<svg xmlns="http://www.w3.org/2000/svg" width="1584" height="396" viewBox="0 0 1584 396">
  <defs>
    <symbol id="mark" viewBox="0 0 24 24">
      <g transform="rotate(30 12 12)">
        <rect x="11" y="2" width="2" height="20" rx="1"/>
        <rect x="11" y="2" width="2" height="20" rx="1" transform="rotate(60 12 12)"/>
        <rect x="11" y="2" width="2" height="20" rx="1" transform="rotate(-60 12 12)"/>
      </g>
    </symbol>
    <linearGradient id="bgsky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6efde"/>
      <stop offset="60%" stop-color="#f6efde"/>
      <stop offset="100%" stop-color="#bfe0f5"/>
    </linearGradient>
    <filter id="softcloud" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>
  <rect width="1584" height="396" fill="url(#bgsky)"/>
  <g filter="url(#softcloud)" fill="#fdfbf5" opacity="0.85">
    <ellipse cx="1280" cy="120" rx="180" ry="32"/>
    <ellipse cx="1420" cy="280" rx="160" ry="28"/>
  </g>

  <g fill="#1a1f2b">
    <use href="#mark" x="100" y="118" width="160" height="160"/>
  </g>

  <text x="290" y="222" fill="#1a1f2b"
        font-family="Fraunces, Georgia, serif" font-style="italic"
        font-size="100" font-weight="500" letter-spacing="-2">Lumiose</text>

  <text x="294" y="266" fill="#3a414f"
        font-family="Inter, system-ui, sans-serif"
        font-size="22" font-weight="500" letter-spacing="2"
        text-transform="uppercase">ESTUDIO DIGITAL</text>

  <line x1="980" y1="140" x2="980" y2="256" stroke="#1a1f2b" stroke-width="1" opacity="0.25"/>

  <text x="1020" y="170" fill="#1a1f2b"
        font-family="Fraunces, Georgia, serif" font-style="italic"
        font-size="28" font-weight="400">Mexicali ↔ Calexico</text>
  <text x="1020" y="210" fill="#3a414f"
        font-family="Inter, system-ui, sans-serif"
        font-size="17" font-weight="400">Diseño · SEO · Publicidad</text>
  <text x="1020" y="236" fill="#3a414f"
        font-family="Inter, system-ui, sans-serif"
        font-size="17" font-weight="400">Infraestructura · Consultoría</text>
  <text x="1020" y="270" fill="#6a7080"
        font-family="Inter, system-ui, sans-serif"
        font-size="14" font-weight="500" letter-spacing="1">LUMIOSE.STUDIO</text>
</svg>
