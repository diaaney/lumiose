<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <symbol id="mark" viewBox="0 0 24 24">
      <g transform="rotate(30 12 12)">
        <rect x="11" y="2" width="2" height="20" rx="1"/>
        <rect x="11" y="2" width="2" height="20" rx="1" transform="rotate(60 12 12)"/>
        <rect x="11" y="2" width="2" height="20" rx="1" transform="rotate(-60 12 12)"/>
      </g>
    </symbol>
    <linearGradient id="bgsky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#bfe0f5"/>
      <stop offset="40%" stop-color="#a7d2ee"/>
      <stop offset="100%" stop-color="#f6efde"/>
    </linearGradient>
    <filter id="softcloud" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>
  <rect width="1080" height="1080" fill="url(#bgsky)"/>
  <g filter="url(#softcloud)" fill="#fdfbf5" opacity="0.85">
    <ellipse cx="200" cy="180" rx="240" ry="44"/>
    <ellipse cx="900" cy="250" rx="220" ry="40"/>
    <ellipse cx="540" cy="130" rx="180" ry="32"/>
  </g>

  <g fill="#1a1f2b">
    <use href="#mark" x="450" y="280" width="180" height="180"/>
  </g>

  <text x="540" y="560" fill="#1a1f2b" text-anchor="middle"
        font-family="Fraunces, Georgia, serif" font-style="italic"
        font-size="132" font-weight="500" letter-spacing="-3">Lumiose</text>

  <text x="540" y="618" fill="#3a414f" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif"
        font-size="24" font-weight="500" letter-spacing="4">ESTUDIO DIGITAL</text>

  <line x1="440" y1="680" x2="640" y2="680" stroke="#1a1f2b" stroke-width="1" opacity="0.3"/>

  <text x="540" y="748" fill="#1a1f2b" text-anchor="middle"
        font-family="Fraunces, Georgia, serif" font-style="italic"
        font-size="34" font-weight="400">Diseño web. SEO.</text>
  <text x="540" y="798" fill="#1a1f2b" text-anchor="middle"
        font-family="Fraunces, Georgia, serif" font-style="italic"
        font-size="34" font-weight="400">Publicidad. Infraestructura.</text>
  <text x="540" y="848" fill="#1a1f2b" text-anchor="middle"
        font-family="Fraunces, Georgia, serif" font-style="italic"
        font-size="34" font-weight="400">Consultoría.</text>

  <text x="540" y="940" fill="#3a414f" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif"
        font-size="22" font-weight="500" letter-spacing="3">MEXICALI ↔ CALEXICO</text>

  <text x="540" y="1000" fill="#6a7080" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif"
        font-size="18" font-weight="500" letter-spacing="2">LUMIOSE.STUDIO</text>
</svg>
